name: crypto_battle_buddy
description: A Crypto Battle Buddy Flutter app.
publish_to: "none"

version: 1.0.2+17

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  path_provider: ^2.1.4
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logos/

flutter_launcher_icons:
  image_path: assets/images/app_icon.png
  android: true
  ios: true
  web:
    generate: true
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0A1F44"
  android: true
  ios: false
  web: false

  android_12:
    color: "#0A1F44"
    image: assets/transparent.png
